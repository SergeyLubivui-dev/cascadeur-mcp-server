<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tools Pro — Cascadeur</title>
<style>
  /* Cascadeur-native look: medium neutral grays, flat, tabbed, list rows */
  :root{
    --bar:#303234; --bar2:#35383b; --body:#43464a; --panel:#3c3f43;
    --row-h:#4c5055; --line:#2b2d30; --line2:#383b3e;
    --txt:#d6d8db; --dim:#93969b; --hdr:#b6b9bd; --active:#eceef0;
    --field:#2b2d2f; --field-b:#232527;
    --btn:#54585d; --btn-h:#5f6469; --accent:#4d6f96; --accent-h:#587fac;
    --ok:#7fc087; --bad:#e07b7b;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--body);color:var(--txt);
    font:12.5px/1.45 "Segoe UI",Roboto,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .app{max-width:560px;margin:0 auto;min-height:100vh;border-left:1px solid var(--line);
    border-right:1px solid var(--line);background:var(--body);display:flex;flex-direction:column}

  /* toolbar */
  .bar{display:flex;align-items:center;gap:10px;height:36px;padding:0 10px;
    background:var(--bar);border-bottom:1px solid var(--line)}
  .brand{font-weight:600;letter-spacing:.2px}
  .brand b{color:#7aa2d6;font-weight:700}
  .spacer{flex:1}
  .lang{display:flex;border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .seg{background:var(--bar2);color:var(--dim);border:0;padding:3px 9px;font:inherit;
    font-weight:600;cursor:pointer}
  .seg.on{background:var(--accent);color:#eef3f8}
  .conn{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--dim)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--bad)}
  .dot.on{background:var(--ok)}

  /* tab strip */
  .tabs{display:flex;background:var(--bar);border-bottom:1px solid var(--line)}
  .tab{background:transparent;border:0;border-right:1px solid var(--line);
    color:var(--dim);padding:7px 16px;font:inherit;font-weight:600;cursor:pointer}
  .tab.on{background:var(--body);color:var(--active)}

  .view{flex:1}
  .secbar{background:var(--bar2);border-bottom:1px solid var(--line);
    padding:5px 12px;font-size:11px;font-weight:700;letter-spacing:.7px;
    text-transform:uppercase;color:var(--hdr)}

  /* status strip */
  .status{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--line)}
  .scell{padding:8px 12px;border-right:1px solid var(--line2)}
  .scell:last-child{border-right:0}
  .scell .k{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .scell .v{font-size:14px;font-weight:600;margin-top:2px;color:var(--active);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* action rows */
  .arow{border-bottom:1px solid var(--line2)}
  .ahead{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer}
  .ahead:hover{background:var(--row-h)}
  .aico{width:20px;text-align:center;font-size:15px;filter:grayscale(.15)}
  .atext{display:flex;flex-direction:column;min-width:0}
  .at{font-weight:600;color:var(--active)}
  .as{font-size:11px;color:var(--dim);margin-top:1px}
  .chev{margin-left:auto;color:var(--dim);transition:transform .12s}
  .arow.open .chev{transform:rotate(90deg)}
  .abody{display:none;flex-direction:column;gap:8px;padding:4px 12px 13px;background:var(--panel)}
  .arow.open .abody{display:flex}
  label{font-size:11px;color:var(--dim);display:block;margin-bottom:4px}
  input[type=text]{width:100%;background:var(--field);border:1px solid var(--field-b);
    color:var(--txt);border-radius:3px;padding:7px 9px;font:12px "Cascadia Code",Consolas,monospace}
  input[type=text]:focus{outline:none;border-color:var(--accent)}
  .frow{display:flex;gap:7px}
  .frow input{flex:1}
  .btn{font:inherit;font-weight:600;border:1px solid var(--line);border-radius:3px;
    padding:7px 12px;cursor:pointer;color:var(--txt);background:var(--btn)}
  .btn:hover{background:var(--btn-h)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:#3f5d80;color:#eef3f8}
  .btn.primary:hover{background:var(--accent-h)}
  .btn.wide{width:100%}

  /* log */
  .log{padding:9px 12px;font:11.5px/1.5 "Cascadia Code",Consolas,monospace;
    color:#c6cad2;white-space:pre-wrap;min-height:160px;max-height:360px;overflow:auto}
  .log .t{color:var(--dim)}
  .log .ok{color:var(--ok)} .log .err{color:var(--bad)} .log .run{color:#d6b46a}
  .foot{padding:9px 12px;font-size:10.5px;color:var(--dim);border-top:1px solid var(--line);
    background:var(--bar)}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <span class="brand">🛠 Tools <b>Pro</b></span>
    <span class="spacer"></span>
    <div class="lang">
      <button class="seg" id="seg-en" onclick="setLang('en')">EN</button>
      <button class="seg" id="seg-ru" onclick="setLang('ru')">RU</button>
    </div>
    <span class="conn"><span id="dot" class="dot"></span><span id="conntxt"></span></span>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-actions" data-t="tab_actions" onclick="showTab('actions')">Actions</button>
    <button class="tab" id="tab-log" data-t="tab_log" onclick="showTab('log')">Log</button>
  </div>

  <div class="view" id="view-actions">
    <div class="secbar" data-t="sec_scene">Scene</div>
    <div class="status">
      <div class="scell"><div class="k" data-t="char">Character</div><div class="v" id="st-char">—</div></div>
      <div class="scell"><div class="k" data-t="frames">Frames</div><div class="v" id="st-frames">—</div></div>
      <div class="scell"><div class="k" data-t="tabs">Tabs</div><div class="v" id="st-tabs">—</div></div>
    </div>
    <div class="secbar" data-t="sec_actions">Actions</div>

    <div class="arow">
      <div class="ahead" onclick="toggle(this)"><span class="aico">🦴</span>
        <span class="atext"><span class="at" data-t="rig_t"></span><span class="as" data-t="rig_s"></span></span>
        <span class="chev">›</span></div>
      <div class="abody">
        <div><label data-t="lbl_src_fbx"></label>
          <div class="frow"><input type="text" id="rig-path" data-tp="ph_model">
          <button class="btn" data-t="browse" onclick="browse('rig-path')"></button></div></div>
        <button class="btn primary wide" data-t="btn_rig" onclick="doRig()"></button>
      </div>
    </div>

    <div class="arow">
      <div class="ahead" onclick="toggle(this)"><span class="aico">🎬</span>
        <span class="atext"><span class="at" data-t="rt_t"></span><span class="as" data-t="rt_s"></span></span>
        <span class="chev">›</span></div>
      <div class="abody">
        <div><label data-t="lbl_src_anim"></label>
          <div class="frow"><input type="text" id="rt-path" data-tp="ph_walk">
          <button class="btn" data-t="browse" onclick="browse('rt-path')"></button></div></div>
        <button class="btn primary wide" data-t="btn_rt" onclick="doRetarget()"></button>
      </div>
    </div>

    <div class="arow">
      <div class="ahead" onclick="toggle(this)"><span class="aico">🧲</span>
        <span class="atext"><span class="at" data-t="pf_t"></span><span class="as" data-t="pf_s"></span></span>
        <span class="chev">›</span></div>
      <div class="abody">
        <button class="btn primary wide" data-t="btn_pf" onclick="doOp('physics_fill','physics_fill')"></button>
      </div>
    </div>

    <div class="arow">
      <div class="ahead" onclick="toggle(this)"><span class="aico">📦</span>
        <span class="atext"><span class="at" data-t="ex_t"></span><span class="as" data-t="ex_s"></span></span>
        <span class="chev">›</span></div>
      <div class="abody">
        <div><label data-t="lbl_out"></label>
          <div class="frow"><input type="text" id="ex-base" data-tp="ph_out">
          <button class="btn" data-t="browse" onclick="browseSave('ex-base')"></button></div></div>
        <div><label data-t="lbl_clips"></label>
          <input type="text" id="ex-clips" data-tp="ph_clips"></div>
        <button class="btn primary wide" data-t="btn_ex" onclick="doExport()"></button>
      </div>
    </div>

    <div class="arow">
      <div class="ahead" onclick="toggle(this)"><span class="aico">🧹</span>
        <span class="atext"><span class="at" data-t="ut_t"></span><span class="as" data-t="ut_s"></span></span>
        <span class="chev">›</span></div>
      <div class="abody">
        <button class="btn wide" data-t="btn_cleanup" onclick="doOp('cleanup_tabs','cleanup')"></button>
      </div>
    </div>
  </div>

  <div class="view" id="view-log" style="display:none">
    <div class="secbar" data-t="tab_log">Log</div>
    <div class="log" id="log"></div>
  </div>

  <div class="foot" data-t="foot"></div>
</div>

<script>
const I18N={
 en:{conn_on:"connected",conn_off:"no Cascadeur",conn_wait:"connecting…",
  tab_actions:"Actions",tab_log:"Log",sec_scene:"Scene",sec_actions:"Actions",
  char:"Character",frames:"Frames",tabs:"Tabs",browse:"Browse",
  rig_t:"Rig Mixamo model",rig_s:"Import FBX · auto bone-map · Quick Rig",
  rt_t:"Retarget animation",rt_s:"Transfer a clip onto the current character",
  pf_t:"Physics fill in-betweens",pf_s:"Spline · IK/fulcrum feet · attractor",
  ex_t:"Export to Unity",ex_s:"Baked clips → Model@clip.fbx",
  ut_t:"Utilities",ut_s:"Housekeeping",
  lbl_src_fbx:"Source .fbx",lbl_src_anim:"Source animation .fbx",
  lbl_out:"Output base path (no extension)",lbl_clips:"Clips — name:start-end, …  (blank = whole)",
  ph_model:"C:/…/model.fbx",ph_walk:"C:/…/walk.fbx",ph_out:"D:/export/character",
  ph_clips:"walk:0-30, sit:30-70, idle:70-100",
  btn_rig:"Import & Rig",btn_rt:"Retarget onto current",btn_pf:"Fill current animation",
  btn_ex:"Export clips",btn_cleanup:"Close extra tabs (free memory)",
  foot:"Panel drives Cascadeur via the local bridge · keep Cascadeur open",
  ready:"ready — keep Cascadeur open.",pick:"pick an .fbx first",setout:"set an output path",done:"done"},
 ru:{conn_on:"подключено",conn_off:"нет Cascadeur",conn_wait:"подключение…",
  tab_actions:"Действия",tab_log:"Журнал",sec_scene:"Сцена",sec_actions:"Действия",
  char:"Персонаж",frames:"Кадры",tabs:"Вкладки",browse:"Обзор",
  rig_t:"Риггинг Mixamo-модели",rig_s:"Импорт FBX · авто-кости · Quick Rig",
  rt_t:"Ретаргет анимации",rt_s:"Перенести клип на текущего персонажа",
  pf_t:"Достроить физикой",pf_s:"Сплайн · IK/фулькрум стопы · аттрактор",
  ex_t:"Экспорт в Unity",ex_s:"Клипы → Model@clip.fbx",
  ut_t:"Утилиты",ut_s:"Обслуживание",
  lbl_src_fbx:"Исходный .fbx",lbl_src_anim:"Анимация .fbx",
  lbl_out:"Путь вывода (без расширения)",lbl_clips:"Клипы — имя:начало-конец, …  (пусто = вся)",
  ph_model:"C:/…/model.fbx",ph_walk:"C:/…/walk.fbx",ph_out:"D:/export/персонаж",
  ph_clips:"walk:0-30, sit:30-70, idle:70-100",
  btn_rig:"Импорт и риг",btn_rt:"Ретаргет на текущего",btn_pf:"Достроить текущую",
  btn_ex:"Экспортировать клипы",btn_cleanup:"Закрыть лишние вкладки (память)",
  foot:"Панель управляет Cascadeur через локальный мост · держите Cascadeur открытым",
  ready:"готово — держите Cascadeur открытым.",pick:"сначала выберите .fbx",setout:"укажите путь вывода",done:"готово"}
};
const $=id=>document.getElementById(id);
let LANG=localStorage.getItem('tp_lang')||'en';
function t(k){return (I18N[LANG][k]!==undefined?I18N[LANG][k]:(I18N.en[k]||k));}
function applyLang(){
  document.querySelectorAll('[data-t]').forEach(e=>e.textContent=t(e.dataset.t));
  document.querySelectorAll('[data-tp]').forEach(e=>e.placeholder=t(e.dataset.tp));
  $('seg-en').classList.toggle('on',LANG==='en');
  $('seg-ru').classList.toggle('on',LANG==='ru');
  document.documentElement.lang=LANG;
  refresh();
}
function setLang(l){LANG=l;localStorage.setItem('tp_lang',l);applyLang();}
function showTab(n){
  $('view-actions').style.display=n==='actions'?'':'none';
  $('view-log').style.display=n==='log'?'':'none';
  $('tab-actions').classList.toggle('on',n==='actions');
  $('tab-log').classList.toggle('on',n==='log');
}
function toggle(h){h.parentElement.classList.toggle('open');}
function log(msg,cls){const l=$('log');const tm=new Date().toLocaleTimeString();
  l.innerHTML+=`\n<span class="t">${tm}</span> <span class="${cls||''}">${msg}</span>`;l.scrollTop=l.scrollHeight;}
async function api(p,b){const r=await fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});return r.json();}
async function refresh(){
  try{const s=await(await fetch('/status')).json();const on=s.connected;
    $('dot').className='dot'+(on?' on':'');
    $('conntxt').textContent=on?t('conn_on'):t('conn_off');
    $('st-char').textContent=s.character||'—';
    $('st-frames').textContent=(s.frames!=null?s.frames:'—');
    $('st-tabs').textContent=(s.tabs!=null?s.tabs:'—');
  }catch(e){$('dot').className='dot';$('conntxt').textContent=t('conn_off');}
}
function run(l){log('▶ '+l+'…','run');}
function fin(l,res){if(res&&res.error){log('✖ '+l+': '+res.error,'err');}
  else{log('✔ '+l+' — '+(res&&res.summary?res.summary:t('done')),'ok');refresh();}}
async function doOp(action,label){run(label);fin(label,await api('/action',{action,args:{}}));}
async function browse(id){const r=await api('/browse',{save:false});if(r.path)$(id).value=r.path;}
async function browseSave(id){const r=await api('/browse',{save:true});if(r.path)$(id).value=r.path;}
async function doRig(){const p=$('rig-path').value.trim();if(!p)return log('✖ '+t('pick'),'err');
  run('rig');fin('rig',await api('/action',{action:'rig',args:{path:p}}));}
async function doRetarget(){const p=$('rt-path').value.trim();if(!p)return log('✖ '+t('pick'),'err');
  run('retarget');fin('retarget',await api('/action',{action:'retarget',args:{path:p}}));}
async function doExport(){const b=$('ex-base').value.trim();if(!b)return log('✖ '+t('setout'),'err');
  run('export');fin('export',await api('/action',{action:'export',args:{base:b,clips:$('ex-clips').value.trim()}}));}
applyLang();
$('log').innerHTML='<span class="t">'+t('ready')+'</span>';
setInterval(refresh,4000);
</script>
</body>
</html>
